<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#fefaf5">
    <title>Избранное | Polkovniki Lubvi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        @font-face {
            font-family: 'New';
            src: url('newyorkerc.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Mon';
            src: url('mon.ttf') format('truetype');
        }

        html, body {
            background-color: #fefaf5;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            overflow: hidden;
        }

        body {
            font-family: 'New', -apple-system, 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .blurred-circles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            filter: blur(50px);
            pointer-events: none;
            background-color: #fefaf5;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            will-change: transform;
        }

        .circle-1 { width: 360px; height: 406px; top: 22%; left: 25%; background-color: #ddd3c9; opacity: 0.7; transform: translate(-50%, -50%); animation: move1 35s infinite alternate ease-in-out; }
        .circle-2 { width: 397px; height: 528px; top: 60%; left: 80%; background-color: #ecc4c3; opacity: 0.65; transform: translate(-50%, -50%); animation: move2 40s infinite alternate ease-in-out; }
        .circle-3 { width: 609px; height: 621px; top: 70%; left: 15%; background-color: #b97d7b; opacity: 0.7; transform: translate(-50%, -50%); animation: move3 38s infinite alternate ease-in-out; }
        .circle-4 { width: 518px; height: 789px; top: 30%; left: 90%; background-color: #efd7cf; opacity: 0.65; transform: translate(-50%, -50%); animation: move4 45s infinite alternate ease-in-out; }
        .circle-5 { width: 636px; height: 336px; top: 85%; left: 75%; background-color: #928e5e; opacity: 0.7; transform: translate(-50%, -50%); animation: move5 42s infinite alternate ease-in-out; }
        .circle-6 { width: 567px; height: 565px; top: 15%; left: 70%; background-color: #575527; opacity: 0.7; transform: translate(-50%, -50%); animation: move6 48s infinite alternate ease-in-out; }

        @keyframes move1 {
            0% { transform: translate(-50%, -50%) translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(-50%, -50%) translate(80px, -60px) rotate(15deg) scale(1.1); }
        }
        @keyframes move2 {
            0% { transform: translate(-50%, -50%) translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(-50%, -50%) translate(-100px, 70px) rotate(-20deg) scale(1.12); }
        }
        @keyframes move3 {
            0% { transform: translate(-50%, -50%) translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(-50%, -50%) translate(70px, 80px) rotate(12deg) scale(1.08); }
        }
        @keyframes move4 {
            0% { transform: translate(-50%, -50%) translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(-50%, -50%) translate(-120px, -70px) rotate(-15deg) scale(1.15); }
        }
        @keyframes move5 {
            0% { transform: translate(-50%, -50%) translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(-50%, -50%) translate(60px, -90px) rotate(18deg) scale(1.12); }
        }
        @keyframes move6 {
            0% { transform: translate(-50%, -50%) translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(-50%, -50%) translate(-80px, 50px) rotate(-14deg) scale(1.1); }
        }

        .favorites-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .favorites-title {
            font-family: 'New', sans-serif;
            font-size: 48px;
            font-weight: 700;
            color: #5a3921;
            text-align: center;
            margin-top: 80px;
            margin-bottom: 30px;
        }

        .favorites-list {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 100px;
        }

        .favorite-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.05));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 
                inset 4px 4px 12px 2px rgba(255, 255, 255, 0.2),
                inset -2px -2px 15px 1px rgba(255, 255, 255, 0.2),
                inset 0 0 15px 2px rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .favorite-card:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.25);
        }

        .favorite-card-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            flex-shrink: 0;
        }

        /* Скрываем картинку, если она не загрузилась */
        .favorite-card-image.error {
            display: none;
        }

        .favorite-card-content {
            padding: 16px 16px 16px 0;
            flex: 1;
        }

        .favorite-card-name {
            font-family: 'New', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #5a3921;
            margin-bottom: 4px;
        }

        .favorites-empty {
            font-family: 'Mon', sans-serif;
            font-size: 18px;
            color: #5a3921;
            opacity: 0.6;
            text-align: center;
            margin-top: 100px;
        }

        .back-button-fav {
            position: fixed;
            bottom: 30px;
            left: 24px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.05));
            backdrop-filter: blur(12px);
            border: none;
            padding: 12px 28px;
            font-size: 18px;
            font-weight: 700;
            color: #5a3921;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Mon', sans-serif;
            border-radius: 40px;
            text-decoration: none;
            z-index: 20;
            box-shadow: 
                inset 4px 4px 12px 2px rgba(255, 255, 255, 0.2),
                inset -2px -2px 15px 1px rgba(255, 255, 255, 0.2),
                inset 0 0 15px 2px rgba(255, 255, 255, 0.2);
        }

        .back-button-fav:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.25);
        }

        @media (max-width: 480px) {
            .favorites-title { font-size: 40px; margin-top: 60px; }
            .favorites-empty { font-size: 16px; margin-top: 80px; }
            .favorite-card-name { font-size: 16px; }
            .favorite-card-content { padding: 12px 12px 12px 0; }
            .favorite-card-image { width: 70px; height: 70px; }
            .back-button-fav { bottom: 20px; left: 16px; font-size: 14px; padding: 10px 20px; }
            .favorites-list { gap: 12px; margin-bottom: 80px; }
            
            .blurred-circles { filter: blur(20px) !important; }
            .circle-1 { filter: blur(10px); opacity: 0.4 !important; width: 250px; height: 280px; }
            .circle-2 { filter: blur(12px); opacity: 0.85 !important; width: 270px; height: 360px; }
            .circle-3 { filter: blur(5px); opacity: 0.5 !important; width: 320px; height: 330px; }
            .circle-4 { filter: blur(15px); opacity: 0.7 !important; width: 280px; height: 430px; }
            .circle-5 { filter: blur(40px); opacity: 0.5 !important; width: 240px; height: 220px; }
            .circle-6 { filter: blur(20px); opacity: 0.15 !important; width: 300px; height: 350px; }
        }
    </style>
</head>
<body>
    <div class="blurred-circles">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
        <div class="circle circle-4"></div>
        <div class="circle circle-5"></div>
        <div class="circle circle-6"></div>
    </div>

    <div class="favorites-content">
        <h1 class="favorites-title">Избранное</h1>
        <div id="favoritesList" class="favorites-list">
            <!-- Здесь будут карточки сохранённых рецептов -->
        </div>
        <div id="emptyMessage" class="favorites-empty">У вас пока нет сохранённых рецептов</div>
    </div>

    <a href="menu.html" class="back-button-fav">← Назад</a>

    <script>
        // Данные рецептов с их страницами и фотографиями
        // БЕЗ ЗАГЛУШЕК - только ваши реальные картинки
        const recipesData = {
            'Мясная пицца': {
                page: 'pizzasuper.html',
                image: 'Рисунок8.png'
            },
            'Суп Фо Бо': {
                page: 'phobo.html',
                image: 'Рисунок1.png'
            },
            'Чахохбили': {
                page: 'chahohbili.html',
                image: 'Рисунок2.png'
            },
            'Минтай с черри помидорками': {
                page: 'mintai.html',
                image: 'Рисунок3.png'
            },
            'Курочка в кисло-сладком соусе': {
                page: 'kurochka.html',
                image: 'Рисунок4.png'
            }
        };

        // Загрузка и отображение избранных рецептов
        function loadFavorites() {
            const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
            const favoritesList = document.getElementById('favoritesList');
            const emptyMessage = document.getElementById('emptyMessage');
            
            if (favorites.length === 0) {
                favoritesList.innerHTML = '';
                emptyMessage.style.display = 'block';
            } else {
                emptyMessage.style.display = 'none';
                favoritesList.innerHTML = favorites.map(recipe => {
                    const recipeInfo = recipesData[recipe];
                    // Если рецепта нет в recipesData, показываем только название без картинки
                    if (!recipeInfo) {
                        return `
                            <div class="favorite-card" data-recipe="${recipe}">
                                <div class="favorite-card-content">
                                    <div class="favorite-card-name">${recipe}</div>
                                </div>
                            </div>
                        `;
                    }
                    return `
                        <div class="favorite-card" data-recipe="${recipe}">
                            <img class="favorite-card-image" src="${recipeInfo.image}" alt="${recipe}" onerror="this.classList.add('error')">
                            <div class="favorite-card-content">
                                <div class="favorite-card-name">${recipe}</div>
                            </div>
                        </div>
                    `;
                }).join('');
                
                // Добавляем обработчики кликов на каждую карточку
                document.querySelectorAll('.favorite-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const recipeName = card.getAttribute('data-recipe');
                        localStorage.setItem('selectedRecipe', recipeName);
                        
                        // Находим страницу для рецепта
                        const recipeInfo = recipesData[recipeName];
                        const targetPage = recipeInfo ? recipeInfo.page : 'recipe-default.html';
                        window.location.href = targetPage;
                    });
                });
            }
        }
        
        // Загружаем избранное при открытии страницы
        loadFavorites();
    </script>
</body>
</html>
