<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLubvi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Анимированный фон на весь сайт -->
    <div class="floating-background">
        <div class="organic-shapes-container">
            <div class="organic-shape shape-1"></div>
            <div class="organic-shape shape-2"></div>
            <div class="organic-shape shape-3"></div>
            <div class="organic-shape shape-4"></div>
            <div class="organic-shape shape-5"></div>
            <div class="organic-shape shape-6"></div>
        </div>
    </div>


    <div class="page-wrapper">

        <!-- Hero Section -->
        <section id="home" class="hero section">
            <div class="hero-container">
                <div class="hero-content">
                    <h1 class="hero-title">
                        <span class="title-line"></span>
                        <span class="title-line"></span>
                        <span class="title-line"></span>
                        <span class="title-line"></span>
                        <span class="title-line"></span>
                    </h1>
                    <div class="hero-subtitle">
                        <span class="subtitle-line"></span>
                        <span class="subtitle-line"></span>
                        <span class="subtitle-line"></span>
                        <span class="subtitle-line"></span>
                        <span class="subtitle-line"></span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Project Showcase -->
        <section id="projects" class="project-showcase section" id="project-showcase">
            <div class="project-showcase-container">
                <div class="project-showcase-header">
                    <div class="showcase-eyebrow"></div>
                    <h2 class="showcase-heading"></h2>
                </div>
                
                <div class="project-showcase-scroll">
                    <div class="project-showcase-items">
                        
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
