<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#fefaf5">
    <title>Рецепт | Polkovniki Lubvi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background-color: #fefaf5;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            overflow: hidden;
        }

        body {
            font-family: 'New', -apple-system, 'Inter', sans-serif;
        }

        /* ФОН С КРУГАМИ */
        .blurred-circles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            filter: blur(50px);
            pointer-events: none;
            background-color: #fefaf5;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
        }

        .circle-1 { width: 360px; height: 406px; top: 22%; left: 25%; background-color: #F59E9E; opacity: 0.7; }
        .circle-2 { width: 397px; height: 528px; top: 60%; left: 80%; background-color: #D4A574; opacity: 0.65; }
        .circle-3 { width: 609px; height: 621px; top: 70%; left: 15%; background-color: #AA9D48; opacity: 0.7; }
        .circle-4 { width: 518px; height: 789px; top: 30%; left: 90%; background-color: #CE5443; opacity: 0.65; }
        .circle-5 { width: 436px; height: 936px; top: 85%; left: 75%; background-color: #97976A; opacity: 0.7; }
        .circle-6 { width: 567px; height: 665px; top: 15%; left: 70%; background-color: #C96055; opacity: 0.7; }

        /* КОНТЕНТ */
        .detail-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .detail-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 32px;
            padding: 30px;
            max-width: 320px;
            width: 100%;
            text-align: center;
        }

        .detail-title {
            font-family: 'New', sans-serif;
            font-size: 28px;
            color: #5a3921;
            margin-bottom: 20px;
        }

        .detail-text {
            font-family: 'Mon', sans-serif;
            font-size: 18px;
            color: #5a3921;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .back-button {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 28px;
            font-size: 18px;
            font-weight: 700;
            color: #5a3921;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Mon', sans-serif;
            border-radius: 40px;
            text-decoration: none;
            display: inline-block;
        }

        .back-button:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.25);
        }
    </style>
</head>
<body>
    <div class="blurred-circles">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
        <div class="circle circle-4"></div>
        <div class="circle circle-5"></div>
        <div class="circle circle-6"></div>
    </div>

    <div class="detail-content">
        <div class="detail-card">
            <h1 class="detail-title">Привет, мир22222!</h1>
            <p class="detail-text">Здесь скоро будет рецепт</p>
            <a href="menu.html" class="back-button">← Назад к рецептам</a>
        </div>
    </div>
</body>
</html>
