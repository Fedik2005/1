<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анимированный фон POLubvi</title>
    <style>
        /* Копируем стили фона из POLubvi */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #fefaf5;
            width: 100vw;
            height: 100vh;
        }
        
        .floating-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        .organic-shapes-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        .organic-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.15;
            animation: float 20s infinite alternate ease-in-out;
        }
        
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(40px, -30px) rotate(15deg) scale(1.1); }
        }
        
        .shape-1 {
            width: 360px;
            height: 406px;
            background: #F59E9E;
            top: 22%;
            left: 25%;
            animation-duration: 18s;
        }
        
        .shape-2 {
            width: 397px;
            height: 528px;
            background: #D4A574;
            top: 60%;
            left: 80%;
            animation-duration: 22s;
        }
        
        .shape-3 {
            width: 609px;
            height: 621px;
            background: #AA9D48;
            top: 70%;
            left: 15%;
            animation-duration: 25s;
        }
        
        .shape-4 {
            width: 518px;
            height: 789px;
            background: #CE5443;
            top: 30%;
            left: 90%;
            animation-duration: 20s;
        }
        
        .shape-5 {
            width: 436px;
            height: 936px;
            background: #97976A;
            top: 85%;
            left: 75%;
            animation-duration: 28s;
        }
        
        .shape-6 {
            width: 567px;
            height: 665px;
            background: #C96055;
            top: 15%;
            left: 70%;
            animation-duration: 24s;
        }
    </style>
</head>
<body>
    <div class="floating-background">
        <div class="organic-shapes-container">
            <div class="organic-shape shape-1"></div>
            <div class="organic-shape shape-2"></div>
            <div class="organic-shape shape-3"></div>
            <div class="organic-shape shape-4"></div>
            <div class="organic-shape shape-5"></div>
            <div class="organic-shape shape-6"></div>
        </div>
    </div>
</body>
</html>
